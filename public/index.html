<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #16213e;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #e94560;
            font-size: 2.5rem;
        }
        p {
            color: #a8a8b3;
            font-size: 1.2rem;
        }
        .badge {
            background: #e94560;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 My DevOps Project</h1>
        <p>Deployed using Jenkins + Docker</p>
        <br>
        <span class="badge">Jenkins</span>
        <span class="badge">Docker</span>
        <span class="badge">GitHub</span>
        <span class="badge">Node.js</span>
        <br><br>
        <p>✅ Pipeline Running Successfully!</p>
    </div>
</body>
</html>
